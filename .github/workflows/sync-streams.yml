name: Sync streams from iptv-org

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at midnight UTC
  workflow_dispatch:       # Allows manual triggers

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout your repository
      uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Set up git user
      run: |
        git config user.name "GitHub Actions Bot"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Add iptv-org remote
      run: git remote add iptv-org https://github.com/iptv-org/iptv.git

    - name: Ignore chmod changes in script
      run: git update-index --assume-unchanged scripts/sync-streams.sh

    - name: Run sync script
      run: |
        chmod +x scripts/sync-streams.sh
        ./scripts/sync-streams.sh

    - name: Push changes (if any)
      uses: ad-m/github-push-action@v0.8.0
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
