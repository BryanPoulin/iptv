- name: Create/Update index.m3u
  run: |
    # List of selected m3u files to combine (edit as needed)
    SELECTED_FILES=("ca.m3u" "us.m3u" "uk.m3u")

    # Start index.m3u with an initial comment
    echo "#EXTM3U" > index.m3u
    echo "# This is a combined playlist generated by GitHub Actions" >> index.m3u
    echo "" >> index.m3u

    # Concatenate the selected .m3u files in streams/
    for FILE in "${SELECTED_FILES[@]}"; do
      if [ -f "streams/$FILE" ]; then
        echo "# --- START $FILE ---" >> index.m3u
        cat "streams/$FILE" >> index.m3u
        echo "# --- END $FILE ---" >> index.m3u
        echo "" >> index.m3u
      else
        echo "Warning: streams/$FILE not found!" >&2
      fi
    done

    # Show the diff, if any
    git diff --index -- index.m3u || true

    # Stage index.m3u even if only index.m3u changed
    git add index.m3u

- name: Commit and push changes (always include index.m3u changes)
  run: |
    git commit -m "Update index.m3u with combined playlist" || echo "No changes to commit"
    git push