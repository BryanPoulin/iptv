name: Sync streams from iptv-org and update index.m3u

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at midnight UTC
  workflow_dispatch:       # Allows manual triggers

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout your repository
      uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Set up git user
      run: |
        git config user.name "GitHub Actions Bot"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Add iptv-org remote
      run: git remote add iptv-org https://github.com/iptv-org/iptv.git

    - name: Ignore chmod changes in script
      run: git update-index --assume-unchanged scripts/sync-streams.sh

    - name: Run sync script
      run: |
        chmod +x scripts/sync-streams.sh
        ./scripts/sync-streams.sh

    - name: Create/Update index.m3u
      run: |
        # List of selected m3u files to combine (edit as needed)
        SELECTED_FILES=("ca.m3u" "us.m3u" "uk.m3u")

        # Start index.m3u with an initial comment
        echo "#EXTM3U" > index.m3u
        echo "# This is a combined playlist generated by GitHub Actions" >> index.m3u
        echo "" >> index.m3u

        # Concatenate the selected .m3u files in streams/
        for FILE in "${SELECTED_FILES[@]}"; do
          if [ -f "streams/$FILE" ]; then
            echo "# --- START $FILE ---" >> index.m3u
            cat "streams/$FILE" >> index.m3u
            echo "# --- END $FILE ---" >> index.m3u
            echo "" >> index.m3u
          else
            echo "Warning: streams/$FILE not found!" >&2
          fi
        done

        # Show differences for debug
        git diff index.m3u || true

        # Stage index.m3u even if only it changed
        git add index.m3u

    - name: Commit and push changes (always include index.m3u changes)
      uses: ad-m/github-push-action@v0.8.0
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}