name: Sync Streams and Generate index.m3u

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false  # disable built-in push (we'll handle it explicitly)

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Make sync script executable
        run: chmod +x scripts/sync-streams.sh

      - name: Run sync script
        run: ./scripts/sync-streams.sh

      - name: Push any changes
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
